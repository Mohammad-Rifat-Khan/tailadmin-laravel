name: Laravel CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

jobs:
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.image.outputs.tag }}

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Node Dependencies
        run: npm ci

      - name: Build Frontend Assets
        run: npm run build

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: mbstring, pdo, pdo_mysql
          coverage: none

      - name: Cache Composer Dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare Laravel Environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run Laravel Tests
        run: php artisan test

      - name: Optimize Laravel
        run: |
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate Image Tag
        id: image
        run: echo "tag=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Build Docker Image
        run: |
          docker build \
            -t $ECR_REPOSITORY:${{ steps.image.outputs.tag }} .

      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REPOSITORY }}:${{ steps.image.outputs.tag }}
          format: table
          exit-code: 0

      - name: Tag Docker Image
        run: |
          docker tag \
            $ECR_REPOSITORY:${{ steps.image.outputs.tag }} \
            ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${{ steps.image.outputs.tag }}

      - name: Push Docker Image
        run: |
          docker push \
            ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${{ steps.image.outputs.tag }}

      - name: Create Image Artifact
        run: |
          echo "${{ steps.image.outputs.tag }}" > image-tag.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-tag
          path: image-tag.txt

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-tag

      - name: Read Image Tag
        id: image
        run: |
          echo "tag=$(cat image-tag.txt)" >> $GITHUB_OUTPUT

      - name: Deploy Application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            aws ecr get-login-password \
                --region ${{ secrets.AWS_REGION }} | \
                docker login \
                --username AWS \
                --password-stdin \
                ${{ secrets.ECR_REGISTRY }}

            docker pull \
                ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:${{ steps.image.outputs.tag }}

            # Detect active environment
            if grep -q "8081" /etc/nginx/sites-available/tailadmin; then
                ACTIVE="blue"
                NEW="green"
                NEW_PORT="8082"
            else
                ACTIVE="green"
                NEW="blue"
                NEW_PORT="8081"
            fi

            echo "Active: $ACTIVE"
            echo "Deploying: $NEW"

            # Remove old new container if exists
            docker stop tailadmin-$NEW || true
            docker rm tailadmin-$NEW || true

            # Start new container
            docker run -d \
                --name tailadmin-$NEW \
                -p $NEW_PORT:80 \
                --restart unless-stopped \
                -e APP_ENV="production" \
                -e APP_DEBUG="false" \
                -e APP_URL="http://${{ secrets.EC2_HOST }}" \
                -e APP_KEY="${{ secrets.APP_KEY }}" \
                -e DB_CONNECTION="mysql" \
                -e DB_HOST="${{ secrets.RDS_ENDPOINT }}" \
                -e DB_PORT="3306" \
                -e DB_DATABASE="tailadmin_laravel" \
                -e DB_USERNAME="laravel" \
                -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
                ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:${{ steps.image.outputs.tag }}

            # Wait for app boot
            sleep 20

            # Laravel optimizations
            docker exec tailadmin-$NEW php artisan migrate --force

            docker exec tailadmin-$NEW php artisan optimize:clear

            docker exec tailadmin-$NEW php artisan config:cache

            docker exec tailadmin-$NEW php artisan route:cache

            docker exec tailadmin-$NEW php artisan view:cache

            # Health check
            curl -f http://localhost:$NEW_PORT || exit 1

            # Switch nginx traffic
            sudo sed -i "s/8081\|8082/$NEW_PORT/" /etc/nginx/sites-available/tailadmin

            sudo systemctl reload nginx

            # Remove old container
            docker stop tailadmin-$ACTIVE || true
            docker rm tailadmin-$ACTIVE || true

            # Cleanup
            docker image prune -af